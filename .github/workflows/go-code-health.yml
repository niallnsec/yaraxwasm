name: Go code health

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: go-code-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.11.4
  BENCHCMP_COMPARE_REF: v1.9.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        shell: bash
        run: |
          set -euo pipefail
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"

      - name: Run golangci-lint on the root module
        run: golangci-lint run ./...

      - name: Install benchcmp native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential clang cmake libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run golangci-lint on benchcmp
        run: make benchcmp-lint
