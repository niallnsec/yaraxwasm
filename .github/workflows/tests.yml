name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-guest-wasm:
    name: Build guest WASM
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.1
          target: wasm32-wasip1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build guest WASM artifacts
        run: |
          make guest-release
          make guest-release-profiling
          mkdir -p .tmp/ci/guest-wasm/release .tmp/ci/guest-wasm/release-profiling
          cp guest/release/yarax_guest.wasm .tmp/ci/guest-wasm/release/yarax_guest.wasm
          cp guest/release-profiling/yarax_guest.wasm .tmp/ci/guest-wasm/release-profiling/yarax_guest.wasm

      - name: Upload guest WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: guest-wasm
          path: |
            .tmp/ci/guest-wasm/release/yarax_guest.wasm
            .tmp/ci/guest-wasm/release-profiling/yarax_guest.wasm
          retention-days: 1

  go-tests:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go test suite
        run: go test ./...

  guest-local-tests:
    name: Guest-backed local tests
    runs-on: ubuntu-latest
    needs:
      - build-guest-wasm
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.1
          target: wasm32-wasip1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Download guest WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: guest-wasm
          path: ${{ github.workspace }}/.tmp/ci/guest-wasm

      - name: Run guest release-backed tests
        env:
          YARAX_GUEST_WASM: ${{ github.workspace }}/.tmp/ci/guest-wasm/release/yarax_guest.wasm
        run: make test-local

      - name: Run profiling tests
        env:
          YARAX_GUEST_WASM: ${{ github.workspace }}/.tmp/ci/guest-wasm/release-profiling/yarax_guest.wasm
        run: make test-profiling-local

  docker-tests:
    name: Docker integration tests
    runs-on: ubuntu-latest
    needs:
      - build-guest-wasm
    timeout-minutes: 120

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download guest WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: guest-wasm
          path: ${{ github.workspace }}/.tmp/ci/guest-wasm

      - name: Run containerized tests
        env:
          CACHE_DIR: ${{ runner.temp }}/yaraxwasm-cache
          YARAX_GUEST_WASM: /workspace/yaraxwasm/.tmp/ci/guest-wasm/release/yarax_guest.wasm
        run: |
          make docker-test
          make docker-test-local-run

  docker-userfaultfd-tests:
    name: Docker userfaultfd tests
    runs-on: ubuntu-latest
    needs:
      - build-guest-wasm
    timeout-minutes: 120

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download guest WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: guest-wasm
          path: ${{ github.workspace }}/.tmp/ci/guest-wasm

      - name: Run containerized userfaultfd tests
        env:
          CACHE_DIR: ${{ runner.temp }}/yaraxwasm-cache
          YARAX_GUEST_WASM: /workspace/yaraxwasm/.tmp/ci/guest-wasm/release/yarax_guest.wasm
        run: |
          make docker-test-userfaultfd
          make docker-test-userfaultfd-local-run
